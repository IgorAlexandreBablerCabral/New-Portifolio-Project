<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portfólio</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* canvas como background */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* conteúdo por cima */
    .ui {
      position: relative;
      z-index: 2;
      pointer-events: none; /* evita conflito com canvas */
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.3);
      pointer-events: auto;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    nav a:hover {
      opacity: 0.7;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 15px;
      font-size: 12px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }
  </style>
</head>

<body>

  <!-- BACKGROUND -->
  <canvas id="canvas"></canvas>

  <!-- UI -->
  <div class="ui">
    <header>
      <h1>Meu Portfólio</h1>
      <nav>
        <a href="#">Início</a>
        <a href="#">Projetos</a>
        <a href="#">Contato</a>
      </nav>
    </header>

    <footer>
      © 2026 - Meu Nome
    </footer>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById("canvas"),
      antialias: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);

    // PLANO GRANDE (preenche toda a tela)
    const geometry = new THREE.PlaneGeometry(12, 7, 120, 120);

    const texture = new THREE.TextureLoader().load(
      "https://picsum.photos/1920/1080"
    );

    const material = new THREE.MeshBasicMaterial({
      map: texture,
      side: THREE.DoubleSide
    });

    const plane = new THREE.Mesh(geometry, material);
    scene.add(plane);

    camera.position.z = 5;

    function animate() {
      requestAnimationFrame(animate);

      const time = Date.now() * 0.002;
      const pos = geometry.attributes.position;

      for (let i = 0; i < pos.count; i++) {
        const wave =
          Math.sin(i * 0.05 + time) * 0.2 +
          Math.cos(i * 0.03 + time * 0.7) * 0.1;

        pos.setZ(i, wave);
      }

      pos.needsUpdate = true;

      renderer.render(scene, camera);
    }

    animate();

    // responsivo
    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>

</body>
</html>
